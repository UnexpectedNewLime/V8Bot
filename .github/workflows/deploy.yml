name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/unexpectednewlime/v8bot:latest
            ghcr.io/unexpectednewlime/v8bot:${{ github.sha }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-client-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Copy compose file and deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "$DEPLOY_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          SSH_OPTS="-i /tmp/deploy_key -o StrictHostKeyChecking=no"

          scp $SSH_OPTS docker-compose.deploy.yml \
            "$DEPLOY_USER@$DEPLOY_HOST:~/v8bot/docker-compose.deploy.yml"

          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" \
            "docker pull ghcr.io/unexpectednewlime/v8bot:latest && \
             cd ~/v8bot && \
             docker compose -f docker-compose.deploy.yml up -d"

          rm /tmp/deploy_key
