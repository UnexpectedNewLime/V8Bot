services:
  car-watch-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: localhost/car-watch-bot:local
    container_name: car-watch-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/car_watch_bot.sqlite3
    volumes:
      - ./data:/data:U
